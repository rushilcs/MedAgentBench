# GRPO config for Qwen3-32B on MedAgentBench, plain-text action interface.
#
# Differences from qwen3_32b_grpo_post_sft_v2.yaml:
#   - env.action_format: "plain_text" — selects the rollout_func path in
#     train_grpo_32b.py, which runs MedAgentEnv (GET/POST/FINISH text actions).
#     This matches the interface the published MedAgentBench paper grades on
#     (Claude 3.5 Sonnet SOTA 69.67%) and the SFT v2 75.0% baseline eval.
#   - output.dir + output.cloud_sync.prefix: NEW prefix
#     (qwen3_32b_run3/grpo_v2_plain_ckpts) so the existing SFT v2 merged
#     weights and JSON-tool GRPO ckpts under qwen3_32b_run3/* stay untouched.
#   - benchmark_reward.rollout_log_path: pointed at the plain output dir.
#
# Same hyperparams as the v2 JSON-tool config (max_steps 100, num_generations 4,
# max_completion_length 2048, beta 0.08, lr 5e-6) so we can read the result
# as "GRPO uplift on top of SFT v2, holding everything else equal".

model:
  name_or_path: "/workspace/qwen3_32b_sft_v2_merged"
  fallback: "Qwen/Qwen3-32B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

qlora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

grpo:
  max_steps: 100
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_prompt_length: 4096
  max_completion_length: 2048
  learning_rate: 5.0e-6
  beta: 0.08
  epsilon: 0.2
  temperature: 0.9
  top_p: 0.95
  gradient_checkpointing: true
  bf16: true
  save_steps: 10
  logging_steps: 1
  log_completions: true
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler_type: "cosine"
  seed: 42
  eval_every_steps: 50

vllm:
  # Plain-text rollout_func calls trainer.model.generate directly; vLLM is
  # bypassed for rollouts. Keep block for parity with the JSON-tool config.
  use_vllm: false
  mode: "server"
  host: "127.0.0.1"
  port: 8000
  gpu_memory_utilization: 0.9
  max_num_seqs: 4
  max_model_len: 8192
  tensor_parallel_size: 1
  vllm_model_impl: "transformers"

env:
  # Selects rollout_func=make_medagent_plain_rollout(...) in train_grpo_32b.py.
  action_format: "plain_text"
  fhir_api_base: "http://localhost:8080/fhir/"
  func_file: "data/medagentbench/funcs_v1.json"
  max_rounds: 8
  use_fhir_snapshot: true
  snapshot_path: "rl_training/outputs/fhir_snapshot.jsonl"
  snapshot_fallthrough: true
  disable_qwen_thinking: true

rewards:
  correctness_weight: 1.0
  efficiency_weight: 0.3
  tool_usage_weight: 0.2
  temporal_grounding_enabled: false
  temporal_grounding_weight: 0.0
  risk_calibrated_deferral_enabled: false
  risk_calibrated_deferral_weight: 0.0
  decision_density_enabled: false
  decision_density_weight: 0.0

benchmark_reward:
  enabled: true
  rollout_log_path: "rl_training/outputs/qwen3_32b_grpo_v2_plain/rollouts.jsonl"
  rollout_log_fraction: 0.12
  max_rounds: 8
  r_succ: 10.0
  r_step: -0.03
  r_exec: 0.05
  r_redundant_get: -0.25
  r_premature_post: -0.8
  r_first_invalid: -3.0
  r_truncated: -0.5
  max_get_exec_bonus_distinct: 8
  strict_parse: true
  efficiency_bonus_max: 0.4
  canonicalize: true
  fsm_constrained_decode: false
  curriculum:
    enabled: false
    query_target_fraction: 0.7
    seed: 42

data:
  training_tasks_path: "rl_training/data/training_tasks_v2.json"
  benchmark_tasks_path: "data/medagentbench/test_data_v2.json"
  tasks_per_type: 30
  include_stress_variants: false
  seed: 42

output:
  # NEW dir + prefix so existing SFT v2 merged weights and JSON-tool GRPO
  # ckpts under qwen3_32b_run3/qwen3_32b_sft_v2_* and qwen3_32b_run3/grpo_v2_ckpts
  # stay untouched. Plain-text run is fully isolated.
  dir: "rl_training/outputs/qwen3_32b_grpo_v2_plain"
  checkpoint_keep_last: 3
  cloud_sync:
    enabled: true
    backend: "b2"
    bucket: "medagentbench-checkpoint"
    prefix: "qwen3_32b_run3/grpo_v2_plain_ckpts"

resilience:
  heartbeat_path: "/tmp/trainer_heartbeat"
  heartbeat_stale_seconds: 7200
  max_runtime_hours: 48
  ntfy_topic: ""
