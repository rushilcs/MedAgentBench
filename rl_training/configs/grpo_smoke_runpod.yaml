# Minimal GRPO run to validate the stack on RunPod (deps, snapshot, merged base,
# benchmark_reward, tmux trainer). Not for reporting SR.
#
# Use: SMOKE_GRPO=1 STAGE=grpo bash rl_training/scripts/launch_runpod.sh
# Or:  python rl_training/scripts/train_grpo_32b.py --config ... --training-tasks ... --dry-run

model:
  name_or_path: "/workspace/qwen3_32b_sft_v2_merged"
  fallback: "Qwen/Qwen3-32B"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

qlora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

# TRL: (1 * 2 * 2) % num_generations == 0 with default GRPO_TORCHRUN_PROCS=2.
grpo:
  max_steps: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  num_generations: 2
  max_prompt_length: 4096
  max_completion_length: 512
  learning_rate: 5.0e-6
  beta: 0.08
  epsilon: 0.2
  temperature: 0.9
  top_p: 0.95
  gradient_checkpointing: true
  bf16: true
  save_steps: 9999
  logging_steps: 1
  log_completions: true
  warmup_ratio: 0.0
  weight_decay: 0.0
  lr_scheduler_type: "constant"
  seed: 42
  eval_every_steps: 50

vllm:
  use_vllm: false
  mode: "server"
  host: "127.0.0.1"
  port: 8000
  gpu_memory_utilization: 0.9
  max_num_seqs: 2
  max_model_len: 8192
  tensor_parallel_size: 1
  vllm_model_impl: "transformers"

env:
  fhir_api_base: "http://localhost:8080/fhir/"
  func_file: "data/medagentbench/funcs_v1.json"
  max_rounds: 8
  use_fhir_snapshot: true
  snapshot_path: "rl_training/outputs/fhir_snapshot.jsonl"
  snapshot_fallthrough: true

rewards:
  correctness_weight: 1.0
  efficiency_weight: 0.3
  tool_usage_weight: 0.2
  temporal_grounding_enabled: false
  temporal_grounding_weight: 0.0
  risk_calibrated_deferral_enabled: false
  risk_calibrated_deferral_weight: 0.0
  decision_density_enabled: false
  decision_density_weight: 0.0

benchmark_reward:
  enabled: true
  rollout_log_path: "rl_training/outputs/grpo_smoke_validation/rollouts.jsonl"
  rollout_log_fraction: 1.0
  rollout_log_sample_failures: true
  max_rounds: 8
  r_succ: 10.0
  r_step: -0.03
  r_exec: 0.05
  r_redundant_get: -0.25
  r_premature_post: -0.8
  r_first_invalid: -3.0
  efficiency_bonus_max: 0.4
  canonicalize: true
  fsm_constrained_decode: false
  curriculum:
    enabled: false
    query_target_fraction: 0.7
    seed: 42

data:
  training_tasks_path: "rl_training/outputs/qwen_pipeline_v2/smoke/training_tasks.json"
  benchmark_tasks_path: "data/medagentbench/test_data_v2.json"
  tasks_per_type: 30
  include_stress_variants: false
  seed: 42

output:
  dir: "rl_training/outputs/grpo_smoke_validation"
  checkpoint_keep_last: 2
  cloud_sync:
    enabled: false
    backend: "b2"
    bucket: ""
    prefix: "smoke/grpo_validation"

resilience:
  heartbeat_path: "/tmp/trainer_heartbeat"
  heartbeat_stale_seconds: 7200
  max_runtime_hours: 6
  ntfy_topic: ""
