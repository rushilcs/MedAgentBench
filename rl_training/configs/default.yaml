env:
  fhir_api_base: "http://localhost:8080/fhir/"
  max_rounds: 8
  data_file: "data/medagentbench/test_data_v2.json"
  func_file: "data/medagentbench/funcs_v1.json"

reward:
  success: 1.0
  failure: 0.0
  invalid_action: -0.1
  step_penalty: -0.01
  valid_retrieval_bonus: 0.1
  valid_post_bonus: 0.05

training_data:
  tasks_per_type: 50
  seed: 42

phase_a:
  expert_model: "gpt-4o"
  use_programmatic: true
  ft_epochs: 3
  base_model: "gpt-4o"

phase_b:
  trajectories_per_task: 5
  temperature: 0.7
  num_iterations: 5
  selection_method: "above_mean"
  min_trajectories: 50
  ft_epochs: 3
  base_model: "gpt-4o"

evaluation:
  temperature: 0.0
